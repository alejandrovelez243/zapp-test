# Local runtime for the Zapp Global Philosophy School platform — one-command boot.
#
#   docker compose up --build      # db + backend + frontend
#   docker compose up -d db backend  # db + backend only (frontend needs Task 15)
#
# req: platform-scaffold-004 (one-command local runtime),
#      platform-scaffold-005 (pgvector DB so dev ≈ prod / Railway pgvector template),
#      platform-scaffold-006 (auto-migration on boot creates the `vector` extension).
#
# No top-level `version:` key — it is obsolete under the Compose Spec and emits a warning.
name: zapp

services:
  # --- Database -----------------------------------------------------------------
  # pgvector/pgvector:pg16 (NOT plain postgres): local MUST ship the `vector`
  # extension so the baseline migration's CREATE EXTENSION succeeds, mirroring
  # Railway's pgvector template (dev ≈ prod). (req -005)
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zapp
      POSTGRES_PASSWORD: zapp
      POSTGRES_DB: zapp
    volumes:
      # Named volume persists data across `docker compose up/down` (cleared by `down -v`).
      - pgdata:/var/lib/postgresql/data
    # Gate dependents on real readiness — pg_isready, not just "container started".
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zapp -d zapp"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    # Uncomment to reach the DB from the host (e.g. local psql / a GUI):
    # ports:
    #   - "5432:5432"

  # --- Backend (FastAPI + uv) ---------------------------------------------------
  # The image CMD already runs `uv run alembic upgrade head` (CREATE EXTENSION vector
  # + schema) THEN `uvicorn` — see backend/Dockerfile. We intentionally DO NOT set a
  # `command:` override here (design.md §3.10 sketches one, but duplicating it would
  # let the compose copy drift from the image's authoritative migrate-then-serve CMD).
  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    # An optional real .env (authored in Task 14) is layered in when present so it can
    # supply LOGFIRE_TOKEN / POSTHOG_KEY / IPINFO_TOKEN etc. without enumerating them
    # here. required:false lets `docker compose up` work BEFORE that file exists.
    env_file:
      - path: .env
        required: false
    # get_settings() REQUIRES ONLY database_url + admin_token to construct, and the
    # migrate-on-boot step calls it — so just those two need real values or the container
    # crashes immediately. NO LLM key is required to boot (migrations + stub /chat make no
    # LLM call). Compose precedence is `environment` > `env_file`, so we use `${VAR:-default}`
    # interpolation: a real root .env (auto-loaded by Compose for interpolation) OVERRIDES
    # these dev defaults, while a clean checkout with no .env still boots on the defaults.
    #   - DATABASE_URL points at the `db` SERVICE hostname (not localhost) on the
    #     compose network; a .env override for compose use should keep host=`db`.
    #   - ADMIN_TOKEN is a throwaway dev placeholder guarding admin endpoints.
    #   - LLM runs ONLY through the Pydantic AI Gateway — there is no direct-provider
    #     fallback. PYDANTIC_AI_GATEWAY_API_KEY is the single key that routes to all
    #     providers (OpenAI, Anthropic, …); the gateway auto-injects traceparent for
    #     Logfire distributed tracing. PYDANTIC_AI_GATEWAY_BASE_URL is optional (inferred
    #     from the key's region prefix). All LLM vars use `${VAR:-}` (empty default) so the
    #     backend boots and migrates without any LLM key set.
    #   - LOGFIRE_TOKEN passed through so Logfire client-side spans reach the right project.
    #     Left empty -> Logfire initialises in safe no-op mode (no error on boot).
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://zapp:zapp@db:5432/zapp}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin}
      # Gateway (one key, all providers — no direct-provider fallback):
      PYDANTIC_AI_GATEWAY_API_KEY: ${PYDANTIC_AI_GATEWAY_API_KEY:-}
      PYDANTIC_AI_GATEWAY_BASE_URL: ${PYDANTIC_AI_GATEWAY_BASE_URL:-}
      # Model strings (gateway/<provider>:<model>; default: OpenAI gpt-4.1):
      ORCHESTRATOR_MODEL: ${ORCHESTRATOR_MODEL:-gateway/openai:gpt-4.1}
      WORKER_MODEL: ${WORKER_MODEL:-gateway/openai:gpt-4.1-mini}
      JUDGE_MODEL: ${JUDGE_MODEL:-gateway/openai:gpt-4.1-mini}
      # Observability (empty -> no-op):
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
    ports:
      - "8000:8000"

  # --- Frontend (Next.js + pnpm) ------------------------------------------------
  # NEXT_PUBLIC_API_URL is the SERVER-SIDE proxy target for the Next.js rewrite
  # (`/api/:path*` -> `${NEXT_PUBLIC_API_URL}/:path*`, see frontend/next.config.ts).
  # That rewrite runs INSIDE this container, so it MUST use the compose service hostname
  # `backend:8000` — NOT `localhost`, which inside the frontend container resolves to the
  # frontend itself and yields `ECONNREFUSED 127.0.0.1:8000`. The browser only ever calls
  # same-origin `/api/*` (lib/api.ts, lib/adminApi.ts), so it never needs to resolve the
  # `backend` hostname; no client code reads NEXT_PUBLIC_API_URL directly.
  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    command: pnpm dev

volumes:
  pgdata:
